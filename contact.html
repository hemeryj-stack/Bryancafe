<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <header class="site-header">
    <nav class="navbar container" aria-label="Main navigation">
      <a class="logo" href="index.html">Bryan’s Café</a>
      <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">☰</button>
      <ul class="nav-links">
        <li><a href="index.html">About</a></li>
        <li><a href="menu.html">Menu</a></li>
        <li><a href="contact.html" aria-current="page">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main class="container page-spacing">
    <section class="page-heading">
      <p class="eyebrow">Get in touch</p>
      <h1>Contact Bryan’s Café</h1>
      <p>The branch details below are loaded from <strong>branches.xml</strong> using JavaScript.</p>
    </section>

    <section class="contact-grid">
      <div class="card form-card">
        <h2>Enquiry Form</h2>
        <form id="enquiry-form" novalidate>
          <div class="form-row">
            <label for="firstName">First Name</label>
            <input id="firstName" name="firstName" type="text" required />
          </div>
          <div class="form-row">
            <label for="lastName">Last Name</label>
            <input id="lastName" name="lastName" type="text" required />
          </div>
          <div class="form-row">
            <label for="email">Email Address</label>
            <input id="email" name="email" type="email" required />
          </div>
          <div class="form-row">
            <label for="subject">Message Subject</label>
            <input id="subject" name="subject" type="text" required />
          </div>
          <div class="form-row">
            <label for="message">Message Body</label>
            <textarea id="message" name="message" rows="6" required></textarea>
          </div>
          <button class="button" type="submit">Submit</button>
          <p id="form-message" class="form-message" aria-live="polite"></p>
        </form>
      </div>

      <div class="card">
        <h2>Our Branches</h2>
        <div id="branches-content" class="branches-list" aria-live="polite">
          <p class="loading">Loading branch details…</p>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p id="copyright"></p>
      <a href="privacy.html" target="_blank" rel="noopener noreferrer">Privacy Policy</a>
    </div>
  </footer>

  <script src="assets/js/script.js"></script>
  <script src="assets/js/contact.js"></script>
</body>
</html>
